<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Islam Elwakeel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="stage">
    <section class="scene intro active" id="intro">
      <div class="sentence" aria-label="not your average software developer">
        <span class="word w1">not</span>
        <span class="word w2">your</span>
        <span class="word w3">average</span>
        <span class="word w4 red">software</span>
        <span class="word w5">developer.</span>
      </div>
    </section>

    <section class="scene identity black" id="identity">
      <div class="identity-core">
        <div class="code-window">
          <span>&lt;/&gt;</span>
        </div>
        <span class="first-name">Islam</span>
        <span class="last-name red">Elwakeel</span>
      </div>
    </section>

    <section class="scene partner red-bg" id="partner">
      <div class="partner-wrap">
        <span class="your">your</span>
        <strong class="partner-tag">TECH PARTNER</strong>
      </div>
    </section>

    <section class="scene roles" id="roles">
      <div class="role-line">
        <span class="role-left">software</span>
        <span class="role-right red">developer</span>
      </div>
    </section>

    <section class="scene based" id="based">
      <p>based in</p>
    </section>

    <section class="scene egypt" id="egypt">
      <div class="egypt-collage">
        <div class="red-band"></div>
        <span class="egypt-title">EGYPT</span>
        <span class="tile t1">&lt;/&gt;</span>
        <span class="tile t2">SQL</span>
        <span class="tile t3">POWER BI</span>
        <span class="tile t4">FLUTTER</span>
        <span class="tile t5">ASP.NET</span>
        <div class="pyramid p1"></div>
        <div class="pyramid p2"></div>
      </div>
    </section>

    <section class="scene help" id="help">
      <div class="help-wrap">
        <span class="help-label">I build</span>
        <div class="cards">
          <span class="yellow-card c1">Mobile Apps</span>
          <span class="yellow-card c2">Web Systems</span>
          <span class="yellow-card c3">Dashboards</span>
          <span class="yellow-card c4">Databases</span>
          <span class="yellow-card c5">Automation</span>
        </div>
      </div>
    </section>

    <section class="scene so" id="so"><p>so ...</p></section>

    <section class="scene closing" id="closing">
      <p>
        <span>Let’s</span>
        <span>create</span>
        <span>systems</span>
        <span>people</span>
        <span>rely</span>
        <span>on.</span>
      </p>
    </section>

    <section class="scene final black" id="final">
      <p>Contact me now.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
