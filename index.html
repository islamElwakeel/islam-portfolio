<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Islam Elwakeel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
  <section class="scene intro" id="intro">
    <div class="intro-sentence">
      <span class="iw i1">not</span>
      <span class="iw i2">your</span>
      <span class="iw i3">average</span>
      <span class="iw i4 red">software</span>
      <span class="iw i5">developer.</span>
    </div>
  </section>

  <section class="scene hello" id="hello"><p>hello</p></section>
  <section class="scene iam" id="iam"><p>i am</p></section>

  <section class="scene browser-scene black" id="browserScene">
    <div class="browser-stack">
      <div class="browser-window">
        <div class="browser-bar">
          <i></i><i></i><i></i>
          <span>islamelwakeel.dev</span>
        </div>
        <video id="portfolioVideo" class="portfolio-video" muted playsinline preload="auto">
          <source src="portfolio-video.mp4" type="video/mp4">
        </video>
      </div>
      <p class="browser-name">Islam Elwakeel</p>
    </div>
  </section>

  <section class="scene red-scene" id="partner">
    <div class="partner">
      <span>your</span>
      <strong>TECH PARTNER</strong>
    </div>
  </section>

  <section class="scene role-scene" id="roles">
    <div class="role-line">
      <span class="role-a">software</span>
      <span class="role-b red">developer</span>
    </div>
  </section>

  <section class="scene based" id="based"><p>based in</p></section>

  <section class="scene egypt" id="egypt">
    <div class="flag"></div>
    <div class="egypt-collage">
      <span class="egypt-word">EGYPT</span>
      <span class="object o1">SQL</span>
      <span class="object o2">&lt;/&gt;</span>
      <span class="object o3">Flutter</span>
      <span class="object o4">Power BI</span>
      <div class="pyramid p1"></div>
      <div class="pyramid p2"></div>
      <div class="pyramid p3"></div>
    </div>
  </section>

  <section class="scene help" id="help">
    <div class="help-inner">
      <span class="help-copy">I build</span>
      <div class="card-pivot">
        <span class="yellow y1">Mobile Apps</span>
        <span class="yellow y2">Web Systems</span>
        <span class="yellow y3">Dashboards</span>
        <span class="yellow y4">Databases</span>
        <span class="yellow y5">Automation</span>
      </div>
    </div>
  </section>

  <section class="scene so" id="so"><p>so ...</p></section>
  <section class="scene closing" id="closing"><p>Let’s create something people won’t forget.</p></section>
  <section class="scene final black" id="final"><p>Contact me now.</p></section>
</main>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="script.js"></script>
</body>
</html>
